{% extends "base.html" %}
{% load static %}
{% block title %}Iniciar sesión{% endblock %}
{% block content %}
<div class="mx-auto mt-10 flex max-w-sm flex-col items-center">
    <img src="{% static 'images/logo_keybyme.png' %}" alt="KeyByMe" class="mb-4 h-20 w-20 rounded-full object-cover shadow">
    <h1 class="mb-6 text-xl font-semibold text-gray-900">Iniciar sesión en KeyByMe</h1>
    <form method="post" class="w-full rounded-xl border border-gray-200 bg-white p-6 shadow-sm">
        {% csrf_token %}
        {% include "_form_fields.html" %}
        <button type="submit" class="w-full rounded-lg bg-blue-600 px-4 py-2 text-sm font-medium text-white shadow-sm hover:bg-blue-700">
            Entrar
        </button>
    </form>
</div>
{% endblock %}
