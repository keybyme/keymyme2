<form method="get" class="mb-4 flex flex-wrap items-center gap-3 rounded-xl border border-gray-200 bg-white p-4 shadow-sm">
    <div class="relative flex-1 min-w-[200px]">
        <span class="pointer-events-none absolute inset-y-0 left-3 flex items-center text-gray-400">
            {% include "icons/search.html" with class="w-4 h-4" %}
        </span>
        <input type="text" name="q" value="{{ query }}" placeholder="Buscar por concepto..."
               class="w-full rounded-lg border border-gray-300 py-2 pl-9 pr-3 text-sm text-gray-900 shadow-sm focus:border-blue-500 focus:outline-none focus:ring-1 focus:ring-blue-500">
    </div>
    <select name="tipo" class="rounded-lg border border-gray-300 py-2 px-3 text-sm text-gray-900 shadow-sm focus:border-blue-500 focus:outline-none focus:ring-1 focus:ring-blue-500">
        <option value="">Ingresos y egresos</option>
        <option value="ingreso" {% if selected_tipo == "ingreso" %}selected{% endif %}>Solo ingresos</option>
        <option value="egreso" {% if selected_tipo == "egreso" %}selected{% endif %}>Solo egresos</option>
    </select>
    <select name="cuenta" class="rounded-lg border border-gray-300 py-2 px-3 text-sm text-gray-900 shadow-sm focus:border-blue-500 focus:outline-none focus:ring-1 focus:ring-blue-500">
        <option value="">Todas las cuentas</option>
        {% for c in cuentas %}
        <option value="{{ c.pk }}" {% if selected_cuenta == c.pk|stringformat:"s" %}selected{% endif %}>{{ c.name }}</option>
        {% endfor %}
    </select>
    <select name="category" class="rounded-lg border border-gray-300 py-2 px-3 text-sm text-gray-900 shadow-sm focus:border-blue-500 focus:outline-none focus:ring-1 focus:ring-blue-500">
        <option value="">Todas las categorías</option>
        {% for cat in categories %}
        <option value="{{ cat.pk }}" {% if selected_category == cat.pk|stringformat:"s" %}selected{% endif %}>{{ cat.name }}</option>
        {% endfor %}
    </select>
    <select name="periodo" onchange="this.form.submit()" class="rounded-lg border border-gray-300 py-2 px-3 text-sm text-gray-900 shadow-sm focus:border-blue-500 focus:outline-none focus:ring-1 focus:ring-blue-500">
        <option value="">Todo el tiempo</option>
        <option value="ytd" {% if selected_periodo == "ytd" %}selected{% endif %}>Lo que va del año</option>
        {% for num, nombre in meses %}
        <option value="{{ num }}" {% if selected_periodo == num|stringformat:"s" %}selected{% endif %}>{{ nombre }}</option>
        {% endfor %}
    </select>
    <button type="submit" class="inline-flex items-center gap-1.5 rounded-lg bg-gray-800 px-4 py-2 text-sm font-medium text-white shadow-sm hover:bg-gray-900">
        {% include "icons/search.html" with class="w-4 h-4" %} Buscar
    </button>
</form>
