<script>
    function copyToClipboard(text) {
        if (navigator.clipboard && window.isSecureContext) {
            return navigator.clipboard.writeText(text);
        }
        // Fallback for HTTP without TLS, where navigator.clipboard is not available.
        const textarea = document.createElement('textarea');
        textarea.value = text;
        textarea.style.position = 'fixed';
        textarea.style.opacity = '0';
        document.body.appendChild(textarea);
        textarea.focus();
        textarea.select();
        try {
            document.execCommand('copy');
        } finally {
            document.body.removeChild(textarea);
        }
        return Promise.resolve();
    }

    function fetchPassword(cell) {
        const valueEl = cell.querySelector('.password-value');
        if (valueEl.dataset.loaded === '1') {
            return Promise.resolve(valueEl.textContent);
        }
        return fetch(cell.dataset.revealUrl, { credentials: 'same-origin' })
            .then((response) => response.json())
            .then((data) => {
                valueEl.textContent = data.password;
                valueEl.dataset.loaded = '1';
                return data.password;
            });
    }

    // Delegado en document (no por celda) para que siga funcionando en filas
    // insertadas después vía fetch (búsqueda "en vivo" de password_list.html).
    document.addEventListener('click', function (event) {
        const cell = event.target.closest('.password-cell');
        if (!cell) return;
        const maskEl = cell.querySelector('.password-mask');
        const valueEl = cell.querySelector('.password-value');

        const toggleBtn = event.target.closest('.password-toggle-btn');
        if (toggleBtn) {
            const isHidden = valueEl.classList.contains('hidden');
            if (isHidden) {
                fetchPassword(cell).then(() => {
                    maskEl.classList.add('hidden');
                    valueEl.classList.remove('hidden');
                    toggleBtn.textContent = 'Hide';
                });
            } else {
                maskEl.classList.remove('hidden');
                valueEl.classList.add('hidden');
                toggleBtn.textContent = 'View';
            }
            return;
        }

        const copyBtn = event.target.closest('.password-copy-btn');
        if (copyBtn) {
            fetchPassword(cell).then((password) => {
                copyToClipboard(password).then(() => {
                    const original = copyBtn.textContent;
                    copyBtn.textContent = 'Copied';
                    setTimeout(() => { copyBtn.textContent = original; }, 1500);
                });
            });
        }
    });
</script>
