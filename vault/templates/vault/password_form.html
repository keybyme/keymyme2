{% extends "base.html" %}
{% block title %}Password{% endblock %}
{% block content %}
<h1 class="mb-6 text-2xl font-semibold text-gray-900">{% if object %}Editar{% else %}Nuevo{% endif %} password</h1>
<form method="post" class="max-w-lg rounded-xl border border-gray-200 bg-white p-6 shadow-sm">
    {% csrf_token %}
    {% include "_form_fields.html" %}
    <div class="mt-6 flex items-center gap-3">
        <button type="submit" class="rounded-lg bg-blue-600 px-4 py-2 text-sm font-medium text-white shadow-sm hover:bg-blue-700">Guardar</button>
        <a href="{% url 'vault:password_list' %}" class="text-sm font-medium text-gray-600 hover:text-gray-900">Cancelar</a>
    </div>
</form>
{% endblock %}
