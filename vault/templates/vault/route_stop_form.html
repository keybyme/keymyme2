{% extends "base.html" %}
{% block title %}Route stop{% endblock %}
{% block content %}
<h1 class="mb-6 text-2xl font-semibold text-gray-900">{% if object %}Edit route stop{% else %}Add stop{% endif %}</h1>

<form method="post" class="max-w-lg rounded-xl border border-gray-200 bg-white p-6 shadow-sm">
    {% csrf_token %}
    {% include "_form_fields.html" %}
    <div class="mt-6 flex items-center gap-3">
        <button type="submit" class="rounded-lg bg-blue-600 px-4 py-2 text-sm font-medium text-white shadow-sm hover:bg-blue-700">Save</button>
        <a href="{% url 'vault:im_here_admin_routes' %}" class="rounded-lg px-4 py-2 text-sm font-medium text-gray-600 hover:bg-gray-100">Cancel</a>
    </div>
</form>
{% endblock %}
