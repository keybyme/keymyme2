{% extends "base.html" %}
{% block title %}Borrar enlace{% endblock %}
{% block content %}
<div class="mx-auto max-w-md rounded-xl border border-gray-200 bg-white p-6 shadow-sm">
    <div class="mb-4 flex items-center gap-3 text-amber-600">
        {% include "icons/exclamation-triangle.html" with class="w-8 h-8" %}
        <h1 class="text-lg font-semibold text-gray-900">¿Borrar "{{ object.name }}"?</h1>
    </div>
    <p class="mb-6 text-sm text-gray-600">Esta acción no se puede deshacer.</p>
    <form method="post" class="flex gap-3">
        {% csrf_token %}
        <button type="submit" class="rounded-lg bg-red-600 px-4 py-2 text-sm font-medium text-white shadow-sm hover:bg-red-700">Sí, borrar</button>
        <a href="{% url 'vault:url_list' %}" class="rounded-lg px-4 py-2 text-sm font-medium text-gray-600 hover:bg-gray-100">Cancelar</a>
    </form>
</div>
{% endblock %}
