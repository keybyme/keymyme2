<div class="password-cell flex items-center gap-2" data-reveal-url="{% url 'vault:password_reveal_json' password.pk %}">
    <span class="password-mask font-mono text-gray-500">••••••••</span>
    <span class="password-value hidden font-mono text-gray-900"></span>
    <button type="button" class="password-toggle-btn text-xs font-medium text-blue-600 hover:text-blue-800">Ver</button>
    <button type="button" class="password-copy-btn text-xs font-medium text-gray-500 hover:text-gray-700">Copiar</button>
</div>
